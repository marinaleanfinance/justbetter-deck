<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustBetter — Investor Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #fff;
      overflow-x: hidden;
    }

    /* ── CABECERA ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 54px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 2.5rem;
    }
    .site-header svg { display: block; }

    /* ── SECCIONES ── */
    .slide {
      width: 100%;
      position: relative;
      line-height: 0;
    }

    .slide img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Fondos según sección */
    .slide.bg-white  { background: #ffffff; }
    .slide.bg-light  { background: #F5F6F8; }
    .slide.bg-navy   { background: #1B2560; }
    .slide.bg-dark   { background: #1E2B6A; }
    .slide.bg-blue   { background: #A8B8D8; }

    /* ── MENÚ LATERAL DE PUNTOS ── */
    #nav-dots {
      position: fixed;
      right: 1.6rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .dot {
      position: relative;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1.5px solid #5569F0;
      background: rgba(85, 105, 240, 0.15);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }

    .dot:hover,
    .dot.active {
      background: #5569F0;
      transform: scale(1.35);
    }

    /* Puntos sobre fondos oscuros */
    #nav-dots.on-dark .dot {
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.15);
    }
    #nav-dots.on-dark .dot:hover,
    #nav-dots.on-dark .dot.active {
      background: #ffffff;
    }

    /* Tooltip con el nombre */
    .dot-label {
      position: absolute;
      right: calc(100% + 0.6rem);
      top: 50%;
      transform: translateY(-50%);
      background: rgba(27, 37, 96, 0.88);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 500;
      padding: 0.25rem 0.55rem;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    #nav-dots.on-dark .dot-label {
      background: rgba(255, 255, 255, 0.92);
      color: #222;
    }

    .dot:hover .dot-label { opacity: 1; }

    /* ── ENLACE TRANSPARENTE SOBRE BOTÓN DE IMAGEN ── */
    .btn-descubre {
      position: absolute;
      top: 82%;
      left: 63%;
      width: 25%;
      height: 7%;
      background: transparent;
      cursor: pointer;
      z-index: 10;
      border-radius: 50px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      #nav-dots { right: 0.75rem; gap: 0.6rem; }
      .dot { width: 7px; height: 7px; }
      .btn-descubre { font-size: 0.75rem; padding: 0.7rem 1.8rem; }
    }
  </style>
</head>

  <!-- MENÚ LATERAL -->

    <a class="btn-descubre" href="https://www.wearejustbetter.com/" target="_blank" rel="noopener"></a>
  </section>


  <script>
    const SECTIONS = [
      { id: 's1',  name: 'Portada',           dark: false },
      { id: 's2',  name: 'Problema',           dark: false },
      { id: 's3',  name: 'Solución',             dark: false },
      { id: 's4',  name: 'Sistema Patentado',   dark: false },
      { id: 's5',  name: 'Tamaño de Mercado',  dark: false },
      { id: 's6',  name: 'Equipo',             dark: false },
      { id: 's7',  name: 'Modelo de Negocio',  dark: false },
      { id: 's8',  name: 'Go to Market',       dark: false },
      { id: 's9',  name: 'Competidores',       dark: false },
      { id: 's10', name: 'Barreras',           dark: true  },
      { id: 's11', name: 'Métricas',           dark: false },
      { id: 's12', name: 'Datos de Éxito',     dark: false },
      { id: 's13', name: 'Proyecciones',       dark: false },
      { id: 's14', name: 'Hoja de Ruta',       dark: true  },
      { id: 's15', name: 'Inversión',          dark: false },
      { id: 's16', name: 'Cierre',             dark: false },
    ];

    const navEl = document.getElementById('nav-dots');
    const dots  = [];

    // Crear puntos
    SECTIONS.forEach((s) => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.innerHTML = `<span class="dot-label">${s.name}</span>`;
      d.addEventListener('click', () => {
        document.getElementById(s.id)
          .scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      navEl.appendChild(d);
      dots.push(d);
    });

    // Activar punto según sección visible
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          const idx = SECTIONS.findIndex(s => s.id === entry.target.id);
          if (idx < 0) return;

          dots.forEach(d => d.classList.remove('active'));
          dots[idx].classList.add('active');

          // Adaptar color del menú según fondo
          SECTIONS[idx].dark
            ? navEl.classList.add('on-dark')
            : navEl.classList.remove('on-dark');
        });
      },
      { threshold: 0.5 }
    );

    SECTIONS.forEach(s => {
      const el = document.getElementById(s.id);
      if (el) observer.observe(el);
    });
  </script>
</body>
</html>
